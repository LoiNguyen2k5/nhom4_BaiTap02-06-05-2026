<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên Mật Khẩu - Profile Manager</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container" style="max-width: 100%; padding: 0 20px;">
      <a href="/" class="navbar-brand">Profile Manager</a>
    </div>
  </nav>

  <div class="container">
    <div id="alert" class="alert"></div>

    <div class="card">
      <div class="card-header">Quên Mật Khẩu</div>

      <!-- Step 1: Request OTP -->
      <form id="requestOtpForm">
        <p style="margin-bottom: 1rem; color: var(--gray-600); font-size: 0.9rem;">
          Nhập email của bạn để nhận mã OTP khôi phục mật khẩu.
        </p>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="example@gmail.com"
            required
          />
        </div>

        <button type="submit" id="btnRequestOtp" class="btn btn-primary" style="width: 100%;">
          Gửi mã OTP
        </button>
      </form>

      <!-- Step 2: Reset Password -->
      <form id="resetPasswordForm" class="hidden">
        <p style="margin-bottom: 1rem; color: var(--gray-600); font-size: 0.9rem;">
          Mã OTP đã được gửi đến email của bạn. Nhập mã và mật khẩu mới bên dưới.
        </p>
        <div class="form-group">
          <label for="otp">Mã OTP</label>
          <input
            type="text"
            id="otp"
            name="otp"
            placeholder="XXXXXX"
            required
            style="letter-spacing: 2px; text-align: center; font-size: 1.1rem;"
          />
        </div>

        <div class="form-group">
          <label for="newPassword">Mật khẩu mới</label>
          <input
            type="password"
            id="newPassword"
            name="newPassword"
            placeholder="Ít nhất 6 ký tự"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu mới</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            placeholder="Nhập lại mật khẩu mới"
            required
          />
        </div>

        <button type="submit" id="btnResetPassword" class="btn btn-primary" style="width: 100%;">
          Đặt lại mật khẩu
        </button>
      </form>

      <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
        <a href="/login.html" style="color: var(--primary-color); text-decoration: none;">&larr; Quay lại Đăng nhập</a>
      </div>
    </div>

    <div class="footer">
      <p>&copy; 2026 Profile Manager. All rights reserved.</p>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      window.location.href = '/profile.html';
    }

    const requestOtpForm = document.getElementById('requestOtpForm');
    const resetPasswordForm = document.getElementById('resetPasswordForm');
    const emailInput = document.getElementById('email');
    
    let savedEmail = '';

    // Xử lý gửi OTP
    requestOtpForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();

      if (!isValidEmail(email)) {
        Alert.error('Email không hợp lệ');
        return;
      }

      try {
        const btn = document.getElementById('btnRequestOtp');
        btn.disabled = true;
        btn.textContent = 'Đang gửi...';

        const response = await ApiClient.post('/auth/forgot-password', { email });
        
        Alert.success(response.message || 'OTP đã được gửi thành công!');
        savedEmail = email;
        
        // Chuyển sang bước 2
        requestOtpForm.classList.add('hidden');
        resetPasswordForm.classList.remove('hidden');

      } catch (error) {
        // ApiClient đã tự show alert error
      } finally {
        const btn = document.getElementById('btnRequestOtp');
        btn.disabled = false;
        btn.textContent = 'Gửi mã OTP';
      }
    });

    // Xử lý Reset Password
    resetPasswordForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = document.getElementById('otp').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!otp) {
        Alert.error('Vui lòng nhập mã OTP');
        return;
      }

      if (newPassword.length < 6) {
        Alert.error('Mật khẩu mới phải có ít nhất 6 ký tự');
        return;
      }

      if (newPassword !== confirmPassword) {
        Alert.error('Xác nhận mật khẩu không khớp');
        return;
      }

      try {
        const btn = document.getElementById('btnResetPassword');
        btn.disabled = true;
        btn.textContent = 'Đang xử lý...';

        const response = await ApiClient.post('/auth/reset-password', {
          email: savedEmail,
          otp,
          newPassword
        });

        Alert.success(response.message || 'Đặt lại mật khẩu thành công!');
        
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 1500);

      } catch (error) {
        const btn = document.getElementById('btnResetPassword');
        btn.disabled = false;
        btn.textContent = 'Đặt lại mật khẩu';
      }
    });
  </script>
</body>
</html>
